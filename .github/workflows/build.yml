name: Build All MCP Servers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.list.outputs.servers }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        run: |
          dirs=$(ls -d servers/*/ | sed 's|servers/||;s|/||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "servers=$dirs" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.matrix.outputs.servers) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker
          install: true

      - name: Log in to GitHub Container Registry
        shell: bash
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          TOKEN="${GHCR_PAT:-${{ secrets.GITHUB_TOKEN }}}"
          echo "$TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Remove orphaned package
        shell: bash
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          TOKEN="${GHCR_PAT:-}"
          if [ -n "$TOKEN" ]; then
            echo "Cleaning up orphaned ${{ matrix.server }} ..."
            ghcr_token=$(curl -s \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${{ github.repository }}/${{ matrix.server }}:delete,pull,push" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.token // empty') 2>/dev/null || true
            if [ -n "$ghcr_token" ]; then
              digest=$(curl -s -I \
                -H "Authorization: Bearer $ghcr_token" \
                "https://ghcr.io/v2/${{ github.repository }}/${{ matrix.server }}/manifests/latest" \
                -o /dev/null -w '%header{Docker-Content-Digest}') 2>/dev/null || true
              if [ -n "$digest" ]; then
                curl -s -X DELETE \
                  -H "Authorization: Bearer $ghcr_token" \
                  "https://ghcr.io/v2/${{ github.repository }}/${{ matrix.server }}/manifests/${digest}" \
                  -o /dev/null -w "  Delete status: %{http_code}\n" || echo "  Delete failed (will still attempt push)"
              else
                echo "  No existing manifest (clean)"
              fi
            else
              echo "  Cannot get GHCR token (may still work)"
            fi
          else
            echo "  GHCR_PAT not set, skipping orphan cleanup"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.server }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: servers/${{ matrix.server }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Make package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg_name="ghcr.io%2F$(echo '${{ github.repository }}' | sed 's|/|%2F|g')%2F${{ matrix.server }}"
          echo "Making ${{ matrix.server }} public ..."
          gh api --method PATCH \
            "/orgs/${{ github.repository_owner }}/packages/container/${pkg_name}/visibility" \
            -f visibility=public --silent 2>/dev/null || \
          gh api --method PATCH \
            "/user/packages/container/${pkg_name}/visibility" \
            -f visibility=public --silent
