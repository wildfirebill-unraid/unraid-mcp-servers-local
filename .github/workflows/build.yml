name: Build All MCP Servers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.list.outputs.servers }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        run: |
          dirs=$(ls -d servers/*/ | sed 's|servers/||;s|/||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "servers=$dirs" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.matrix.outputs.servers) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.server }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: servers/${{ matrix.server }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg_name="ghcr.io%2F$(echo '${{ github.repository }}' | sed 's|/|%2F|g')%2F${{ matrix.server }}"
          echo "Making ${{ matrix.server }} public ..."
          gh api --method PATCH \
            "/orgs/${{ github.repository_owner }}/packages/container/${pkg_name}/visibility" \
            -f visibility=public --silent 2>/dev/null || \
          gh api --method PATCH \
            "/user/packages/container/${pkg_name}/visibility" \
            -f visibility=public --silent
