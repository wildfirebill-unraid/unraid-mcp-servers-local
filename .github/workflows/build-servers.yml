name: Build & Push MCP Servers

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      servers:
        description: 'Comma-separated server names to build (empty = all)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/wildfirebill-unraid/unraid-mcp-servers
  MAX_PARALLEL: 4

jobs:
  build:
    runs-on: ubuntu-latest
    environment: GHCR_PAT
    concurrency: build-images
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build images
        run: |
          set -e
          SERVERS_LIST="${{ github.event.inputs.servers }}"
          if [ -z "$SERVERS_LIST" ]; then
            SERVERS=$(ls -d servers/*/)
          else
            for name in $(echo "$SERVERS_LIST" | tr ',' ' '); do
              if [ ! -d "servers/$name" ]; then
                echo "ERROR: Server 'servers/$name' not found"
                exit 1
              fi
              echo "servers/$name/"
            done > /tmp/servers.txt
            SERVERS=$(cat /tmp/servers.txt)
          fi

          echo "Building $(echo "$SERVERS" | wc -w) servers..."

          for server_path in $SERVERS; do
            name=$(basename "$server_path")
            tag="$IMAGE_BASE/$name:latest"

            # Wait if at max parallel
            while [ "$(jobs -r | wc -l)" -ge "$MAX_PARALLEL" ]; do
              sleep 2
            done

            echo "--- Starting build: $name ---"
            (
              echo "Building $name ($tag)..."
              docker buildx build \
                --tag "$tag" \
                --push \
                "./servers/$name" 2>&1 | sed "s/^/[$name] /"
              echo "--- Completed build: $name ---"
            ) &
          done

          # Wait for all remaining builds
          echo "Waiting for remaining builds to finish..."
          wait
          echo "=== All builds complete ==="
