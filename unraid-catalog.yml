version: 3
name: unraid-mcp
displayName: Unraid MCP Toolset
servers:
  filesystem-mcp:
    description: "Read, write, search, and browse files on Unraid shares. Sandboxed to a configurable path."
    title: "Filesystem MCP"
    type: "server"
    image: "ghcr.io/wildfirebill-unraid/unraid-mcp-servers/filesystem-mcp:latest"
    env:
      - name: "FILESYSTEM_ALLOWED_PATH"
        value: "/mnt/user"
    command:
      - "--transport=stdio"
    config:
      - name: "filesystem-mcp"
        description: "Filesystem server configuration"
        type: "object"
        properties:
          allowed_path:
            type: "string"
            description: "Root path the server can access (e.g. /mnt/user)"
            default: "/data"
        required: []

  system-info-mcp:
    description: "Get system information: CPU, memory, disk usage, network stats, running processes, and uptime."
    title: "System Info MCP"
    type: "server"
    image: "ghcr.io/wildfirebill-unraid/unraid-mcp-servers/system-info-mcp:latest"
    env:
      - name: "FILESYSTEM_ALLOWED_PATH"
        value: "/tmp"
    command:
      - "--transport=stdio"
    config:
      - name: "system-info-mcp"
        description: "No configuration required"
        type: "object"
        properties: {}
        required: []

  sqlite-mcp:
    description: "Query, create, and manage SQLite databases. Supports SELECT, INSERT, UPDATE, DELETE, DDL."
    title: "SQLite MCP"
    type: "server"
    image: "ghcr.io/wildfirebill-unraid/unraid-mcp-servers/sqlite-mcp:latest"
    env:
      - name: "SQLITE_DB_DIR"
        value: "/mnt/user/data/mcp/sqlite"
    command:
      - "--transport=stdio"
    config:
      - name: "sqlite-mcp"
        description: "SQLite server configuration"
        type: "object"
        properties:
          db_dir:
            type: "string"
            description: "Directory containing .db files (e.g. /mnt/user/appdata)"
            default: "/data"
        required: []

  docker-mcp:
    description: "List, inspect, start, stop, restart Docker containers and view logs. Also lists images with sizes."
    title: "Docker MCP"
    type: "server"
    image: "ghcr.io/wildfirebill-unraid/unraid-mcp-servers/docker-mcp:latest"
    env:
      - name: "DOCKER_HOST"
        value: "unix:///var/run/docker.sock"
    command:
      - "--transport=stdio"
    config:
      - name: "docker-mcp"
        description: "Docker server configuration"
        type: "object"
        properties: {}
        required: []

  check-host-mcp:
    description: "Network diagnostics: DNS lookup, ping, TCP port check, HTTP status check, reverse DNS, and WHOIS."
    title: "Check Host MCP"
    type: "server"
    image: "ghcr.io/wildfirebill-unraid/unraid-mcp-servers/check-host-mcp:latest"
    command:
